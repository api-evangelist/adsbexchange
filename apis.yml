apis:
  - name: ADS-B Exchange Aircraft API
    description: REST API providing real-time global aircraft positions, ICAO hex
      identifiers, registrations, squawk codes, altitude, speed, heading, and military
      aircraft flags. Delivered via the gateway.adsbexchange.com endpoint with API
      key authentication. Accessible via RapidAPI for community and non-commercial
      use with paid commercial tiers available.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
