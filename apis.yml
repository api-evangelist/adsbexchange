name: ADS-B Exchange
description: Unfiltered flight tracking network with REST APIs for accessing real-time
  aircraft positions, military flights, and global ADS-B flight data without filtering.
  Operated by a crowdsourced global network of ADS-B and MLAT receivers providing
  ultra-low-latency aircraft tracking data for aviation research and applications.
